<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR UPVC - Interactive Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }
        
        #sidebar { 
            width: 300px; 
            background: #2c3e50; 
            color: white; 
            overflow-y: auto; 
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        #sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        
        .location-item { 
            padding: 12px; 
            margin-bottom: 8px; 
            background: #34495e; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .location-item:hover { background: #1abc9c; }

        #map { flex-grow: 1; height: 100%; background-color: #f0f0f0; }
        
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
        }
        .custom-popup .leaflet-popup-content {
            margin: 0;
            width: 250px !important;
        }
        .slider-container {
            position: relative;
            width: 250px;
            height: 150px;
            overflow: hidden;
            background: #000;
        }
        .slider-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .slider-container img.active {
            opacity: 1;
        }
        .popup-text { padding: 10px; text-align: center; font-weight: bold; background: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>My Project Locations</h2>
        <div id="location-list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var map = L.map('map').setView([12.8900, 80.1600], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            const workMemories = [
                { id: 1, name: "Ponmar", coords: [12.8727, 80.1765], images: ["L22.webp", "ponmar2.jpg", "ponmar3.jpg"] },
                { id: 2, name: "Madambakkam", coords: [12.8884, 80.1593], images: ["madam1.jpg", "madam2.jpg"] },
                { id: 3, name: "Perungalathur", coords: [12.9064, 80.0984], images: ["perun1.jpg"] },
                { id: 4, name: "Sithalapakkam", coords: [12.8797, 80.1904], images: ["sithal1.jpg"] },
                { id: 5, name: "Karapakkam", coords: [12.9157, 80.2285], images: ["kara1.jpg"] },
                { id: 6, name: "Agaram Then", coords: [12.8752, 80.1472], images: ["agaram1.jpg"] },
                { id: 7, name: "Kovilancheri", coords: [12.8631, 80.1795], images: ["kovil1.jpg"] }
            ];

            const listContainer = document.getElementById('location-list');
            const markers = {};
            let activeInterval = null;

            workMemories.forEach(site => {
                const imagesHtml = site.images.map((img, index) => 
                    `<img src="${img}" class="${index === 0 ? 'active' : ''}" />`
                ).join('');

                const popupContent = `
                    <div class="custom-popup">
                        <div class="slider-container" id="slider-${site.id}">
                            ${imagesHtml}
                        </div>
                        <div class="popup-text">${site.name} Site</div>
                    </div>
                `;

                var marker = L.marker(site.coords).addTo(map);
                marker.bindPopup(popupContent);
                markers[site.id] = marker;

             // ---- idhula ellame ok dha da color matum website frontend ku matching ah podanum and neraiya locations add pananum da adhu na panikuren , nee frontend la oru button create panni idha add pandradhu yepdi nu paru da okva aprm image size okva paru ilana increase panna nalla irukum nah panidu daa ---- // 

                marker.on('popupopen', function() {
                    const container = document.getElementById(`slider-${site.id}`);
                    const imgs = container.querySelectorAll('img');
                    if (imgs.length <= 1) return;

                    let currentIdx = 0;
                    activeInterval = setInterval(() => {
                        imgs[currentIdx].classList.remove('active');
                        currentIdx = (currentIdx + 1) % imgs.length;
                        imgs[currentIdx].classList.add('active');
                    }, 2000); // Transitions ella 2 seconds kum 
                });

                marker.on('popupclose', function() {
                    if (activeInterval) {
                        clearInterval(activeInterval);
                        activeInterval = null;
                    }
                });

                const item = document.createElement('div');
                item.className = 'location-item';
                item.innerHTML = `<strong>${site.name}</strong><br><small>Click to view site</small>`;
                item.onclick = function() {
                    map.flyTo(site.coords, 16, { animate: true, duration: 1.5 });
                    setTimeout(() => { markers[site.id].openPopup(); }, 1500);
                };
                listContainer.appendChild(item);
            });
        });
    </script>
</body>
</html>
